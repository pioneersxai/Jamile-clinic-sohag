<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - عيادات چميلة</title>

    <link rel="icon" type="image/png" href="../Logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>body{font-family:'Cairo',sans-serif;}</style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="../Logo.png" alt="عيادات چميلة" class="auth-logo-img">
                    <div class="auth-logo" style="font-size:1.4rem;">عيادات <span class="x">چميلة</span></div>
                    <p class="auth-tagline"><i class="fas fa-spa" style="color:var(--primary);margin-left:6px;"></i>چميلة.. عيشي الفرق</p>
                </div>

                <div class="auth-title">
                    <h1>أهلاً بيكي في چميلة</h1>
                    <p>سجّلي دخولك وتابعي حجوزاتك وجلساتك بسهولة</p>
                </div>

                <div class="alert" id="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                            <span class="input-icon" onclick="togglePassword()">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <a href="forgot-password.html" class="forgot-link">نسيتي كلمة المرور؟</a>

                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">تسجيل الدخول</button>
                </form>

                <div class="auth-footer">
                    مفيش حساب؟ <a href="register.html">احجزي الآن</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="js/api.js"></script>
    <script>
        // 1. Redirect if already logged in
        if (API.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        // 2. Password visibility toggle
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // 3. Robust Alert display
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
        }

        // 4. Form submission handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            const cleanEmail = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جارِ تسجيل الدخول...';

            try {
                const result = await API.login(cleanEmail, password);

                if (result.success) {
                    showAlert('تم تسجيل الدخول بنجاح! جارِ التحويل...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    showAlert(result.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة');
                    btn.disabled = false;
                    btn.innerHTML = 'تسجيل الدخول';
                }
            } catch (err) {
                console.error("Critical Login Error:", err);
                showAlert("فشل الاتصال. تأكدي من الإنترنت.");
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول';
            }
        });
    </script>
</body>
</html>
