<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور - عيادات چميلة</title>
    <link rel="icon" type="image/png" href="../Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>body{font-family:'Cairo',sans-serif;}</style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="../Logo.png" alt="عيادات چميلة" class="auth-logo-img">
                    <div class="auth-logo" style="font-size:1.4rem;">عيادات <span class="x">چميلة</span></div>
                    <p class="auth-tagline"><i class="fas fa-spa" style="color:var(--primary);margin-left:6px;"></i>چميلة.. عيشي الفرق</p>
                </div>

                <div class="auth-title">
                    <h1>نسيتي كلمة المرور؟</h1>
                    <p>محدش هيقلق، هنبعتلك رابط لإعادة التعيين</p>
                </div>

                <div class="alert" id="alert"></div>

                <form id="forgotForm">
                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">إرسال رابط إعادة التعيين</button>
                </form>

                <div class="auth-footer">
                    <a href="index.html"><i class="fas fa-arrow-left"></i> رجوع لتسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="js/api.js"></script>
    <script>
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جارِ الإرسال...';

            const result = await API.forgotPassword(document.getElementById('email').value);

            if (result.success) {
                showAlert('تم إرسال رابط إعادة التعيين! تحققي من بريدك الإلكتروني.', 'success');
            } else {
                showAlert(result.message || 'فشل إرسال رابط إعادة التعيين');
            }

            btn.disabled = false;
            btn.innerHTML = 'إرسال رابط إعادة التعيين';
        });
    </script>
</body>
</html>
